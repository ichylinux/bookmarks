<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ブックマーク</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #4f6ef7;
      --primary-dark: #3a56d4;
      --danger: #e74c3c;
      --danger-dark: #c0392b;
      --bg: #f0f2f8;
      --surface: #ffffff;
      --border: #dde1f0;
      --text: #2c3e50;
      --text-muted: #7f8c9a;
      --folder-bg: #f5f7ff;
      --folder-border: #c5cff7;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== Header ===== */
    .app-header {
      background: var(--primary);
      color: white;
      padding: 0 20px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .app-header h1 {
      font-size: 1.2rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-search {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 6px 14px;
      gap: 8px;
    }
    .header-search input {
      background: none;
      border: none;
      outline: none;
      color: white;
      font-size: 0.9rem;
      width: 180px;
    }
    .header-search input::placeholder { color: rgba(255,255,255,0.7); }
    .header-search svg { opacity: 0.8; }

    /* ===== Layout ===== */
    .app-body {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 16px;
    }

    /* ===== Breadcrumb ===== */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 16px;
      font-size: 0.88rem;
      flex-wrap: wrap;
    }
    .breadcrumb-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .breadcrumb-link {
      color: var(--primary);
      cursor: pointer;
      text-decoration: none;
      padding: 2px 6px;
      border-radius: 4px;
      transition: background 0.15s;
    }
    .breadcrumb-link:hover { background: rgba(79,110,247,0.1); }
    .breadcrumb-current {
      color: var(--text-muted);
      padding: 2px 6px;
    }
    .breadcrumb-sep { color: var(--text-muted); }

    /* ===== Toolbar ===== */
    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
      white-space: nowrap;
    }
    .btn-primary {
      background: var(--primary);
      color: white;
    }
    .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: var(--shadow); }
    .btn-secondary {
      background: var(--surface);
      color: var(--primary);
      border: 1.5px solid var(--primary);
    }
    .btn-secondary:hover { background: rgba(79,110,247,0.06); }
    .btn-danger {
      background: var(--danger);
      color: white;
    }
    .btn-danger:hover { background: var(--danger-dark); }
    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      padding: 4px 8px;
      font-size: 0.8rem;
    }
    .btn-ghost:hover { color: var(--text); background: var(--border); }

    /* ===== List ===== */
    .bookmark-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .item {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: box-shadow 0.15s, border-color 0.15s;
    }
    .item:hover { box-shadow: var(--shadow); }
    .item.folder {
      background: var(--folder-bg);
      border-color: var(--folder-border);
    }
    .item-icon {
      font-size: 1.3rem;
      flex-shrink: 0;
      width: 28px;
      text-align: center;
    }
    .item-favicon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      border-radius: 3px;
      object-fit: contain;
    }
    .item-content {
      flex: 1;
      min-width: 0;
    }
    .item-title {
      font-weight: 600;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .item-title a {
      color: var(--text);
      text-decoration: none;
    }
    .item-title a:hover { color: var(--primary); text-decoration: underline; }
    .item-url {
      font-size: 0.78rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    .item-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }
    .folder-link {
      cursor: pointer;
      color: var(--primary-dark);
      font-weight: 700;
    }
    .folder-link:hover { text-decoration: underline; }

    /* ===== Empty state ===== */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-icon { font-size: 3rem; margin-bottom: 12px; }
    .empty p { font-size: 0.95rem; }

    /* ===== Search results ===== */
    .search-header {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    .search-path {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 2px;
    }
    mark {
      background: #ffe58f;
      border-radius: 2px;
      padding: 0 1px;
    }

    /* ===== Modal ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 16px;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--surface);
      border-radius: 14px;
      padding: 28px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    .modal h2 {
      font-size: 1.1rem;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text-muted);
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-group input:focus, .form-group select:focus {
      border-color: var(--primary);
    }
    .form-error {
      font-size: 0.8rem;
      color: var(--danger);
      margin-top: 4px;
    }
    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 24px;
    }

    /* ===== Toast ===== */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 300;
    }
    .toast {
      background: #2c3e50;
      color: white;
      padding: 12px 18px;
      border-radius: 8px;
      font-size: 0.88rem;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      animation: slideIn 0.2s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toast.success { background: #27ae60; }
    .toast.error { background: var(--danger); }
    @keyframes slideIn {
      from { transform: translateX(40px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* ===== Responsive ===== */
    @media (max-width: 600px) {
      .header-search input { width: 120px; }
      .item-url { display: none; }
      .modal { padding: 20px; }
    }
  </style>
</head>
<body>

<header class="app-header">
  <h1>🔖 ブックマーク</h1>
  <div class="header-search">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="searchInput" placeholder="検索..." autocomplete="off">
  </div>
</header>

<div class="app-body">
  <nav class="breadcrumb" id="breadcrumb"></nav>
  <div class="toolbar" id="toolbar"></div>
  <div id="searchHeader" class="search-header hidden"></div>
  <div class="bookmark-list" id="bookmarkList"></div>
</div>

<!-- Modal -->
<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle"></h2>
    <form id="modalForm" novalidate>
      <div class="form-group" id="typeGroup">
        <label>種類</label>
        <select id="itemType">
          <option value="bookmark">ブックマーク</option>
          <option value="folder">フォルダ</option>
        </select>
      </div>
      <div class="form-group">
        <label for="itemTitle">タイトル <span style="color:var(--danger)">*</span></label>
        <input type="text" id="itemTitle" placeholder="タイトルを入力">
        <div class="form-error" id="titleError"></div>
      </div>
      <div class="form-group" id="urlGroup">
        <label for="itemUrl">URL <span style="color:var(--danger)">*</span></label>
        <input type="url" id="itemUrl" placeholder="https://example.com">
        <div class="form-error" id="urlError"></div>
      </div>
      <div class="form-group" id="folderGroup">
        <label for="itemFolder">フォルダ</label>
        <select id="itemFolder"></select>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" id="modalCancel">キャンセル</button>
        <button type="submit" class="btn btn-primary" id="modalSave">保存</button>
      </div>
    </form>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
// ===== Storage =====
const STORAGE_KEY = 'bookmarks_app_v1';

function load() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { folders: [], bookmarks: [] };
  } catch { return { folders: [], bookmarks: [] }; }
}

function save(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

// ===== State =====
let state = {
  currentFolderId: null,  // null = root
  editingItem: null,      // { type, id }
  addingType: null,
  searchQuery: '',
};

let data = load();

// ===== Render =====
function render() {
  renderBreadcrumb();
  renderToolbar();
  if (state.searchQuery) {
    renderSearch();
  } else {
    renderList();
  }
}

function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  const currentFolder = state.currentFolderId
    ? data.folders.find(f => f.id === state.currentFolderId)
    : null;

  let html = `<span class="breadcrumb-item">
    <span class="breadcrumb-link" onclick="navigate(null)">🏠 ルート</span>
  </span>`;

  if (currentFolder) {
    html += `<span class="breadcrumb-sep">›</span>
    <span class="breadcrumb-item">
      <span class="breadcrumb-current">📁 ${esc(currentFolder.title)}</span>
    </span>`;
  }

  bc.innerHTML = html;
}

function renderToolbar() {
  const tb = document.getElementById('toolbar');
  const inFolder = state.currentFolderId !== null;

  let html = `<button class="btn btn-primary" onclick="openAddModal('bookmark')">
    🔖 ブックマークを追加
  </button>`;

  if (!inFolder) {
    html += `<button class="btn btn-secondary" onclick="openAddModal('folder')">
      📁 フォルダを作成
    </button>`;
  }

  tb.innerHTML = html;
}

function renderList() {
  const list = document.getElementById('bookmarkList');
  document.getElementById('searchHeader').classList.add('hidden');

  const folderId = state.currentFolderId;
  const folders = folderId === null
    ? data.folders.slice().sort((a, b) => a.title.localeCompare(b.title, 'ja'))
    : [];
  const bookmarks = data.bookmarks
    .filter(b => (b.folderId || null) === folderId)
    .sort((a, b) => a.title.localeCompare(b.title, 'ja'));

  if (folders.length === 0 && bookmarks.length === 0) {
    list.innerHTML = `<div class="empty">
      <div class="empty-icon">${folderId ? '📂' : '🔖'}</div>
      <p>ブックマークがありません</p>
    </div>`;
    return;
  }

  let html = '';
  for (const f of folders) {
    const count = data.bookmarks.filter(b => b.folderId === f.id).length;
    html += `<div class="item folder">
      <span class="item-icon">📁</span>
      <div class="item-content">
        <div class="item-title">
          <span class="folder-link" onclick="navigate('${f.id}')">${esc(f.title)}</span>
        </div>
        <div class="item-url">${count} 件のブックマーク</div>
      </div>
      <div class="item-actions">
        <button class="btn btn-ghost" onclick="openEditModal('folder','${f.id}')">✏️ 編集</button>
        <button class="btn btn-ghost" style="color:var(--danger)" onclick="deleteItem('folder','${f.id}')">🗑️ 削除</button>
      </div>
    </div>`;
  }

  for (const b of bookmarks) {
    const faviconUrl = getFavicon(b.url);
    html += `<div class="item">
      <img class="item-favicon" src="${esc(faviconUrl)}" alt="" onerror="this.style.display='none'">
      <div class="item-content">
        <div class="item-title"><a href="${esc(b.url)}" target="_blank" rel="noopener">${esc(b.title)}</a></div>
        <div class="item-url">${esc(b.url)}</div>
      </div>
      <div class="item-actions">
        <button class="btn btn-ghost" onclick="openEditModal('bookmark','${b.id}')">✏️ 編集</button>
        <button class="btn btn-ghost" style="color:var(--danger)" onclick="deleteItem('bookmark','${b.id}')">🗑️ 削除</button>
      </div>
    </div>`;
  }

  list.innerHTML = html;
}

function renderSearch() {
  const q = state.searchQuery.toLowerCase();
  const list = document.getElementById('bookmarkList');
  const header = document.getElementById('searchHeader');

  const results = data.bookmarks.filter(b =>
    b.title.toLowerCase().includes(q) || b.url.toLowerCase().includes(q)
  );

  header.classList.remove('hidden');
  header.textContent = `"${state.searchQuery}" の検索結果: ${results.length} 件`;

  if (results.length === 0) {
    list.innerHTML = `<div class="empty">
      <div class="empty-icon">🔍</div>
      <p>一致するブックマークが見つかりません</p>
    </div>`;
    return;
  }

  let html = '';
  for (const b of results) {
    const folder = b.folderId ? data.folders.find(f => f.id === b.folderId) : null;
    const faviconUrl = getFavicon(b.url);
    const hilTitle = highlight(b.title, q);
    const hilUrl = highlight(b.url, q);

    html += `<div class="item">
      <img class="item-favicon" src="${esc(faviconUrl)}" alt="" onerror="this.style.display='none'">
      <div class="item-content">
        <div class="item-title"><a href="${esc(b.url)}" target="_blank" rel="noopener">${hilTitle}</a></div>
        <div class="item-url">${hilUrl}</div>
        ${folder ? `<div class="search-path">📁 ${esc(folder.title)}</div>` : ''}
      </div>
      <div class="item-actions">
        <button class="btn btn-ghost" onclick="openEditModal('bookmark','${b.id}')">✏️ 編集</button>
        <button class="btn btn-ghost" style="color:var(--danger)" onclick="deleteItem('bookmark','${b.id}')">🗑️ 削除</button>
      </div>
    </div>`;
  }
  list.innerHTML = html;
}

// ===== Navigation =====
function navigate(folderId) {
  state.currentFolderId = folderId || null;
  state.searchQuery = '';
  document.getElementById('searchInput').value = '';
  render();
}

// ===== Modal =====
function openAddModal(type) {
  state.editingItem = null;
  state.addingType = type;

  document.getElementById('modalTitle').textContent =
    type === 'folder' ? '📁 フォルダを作成' : '🔖 ブックマークを追加';

  const typeGroup = document.getElementById('typeGroup');
  const urlGroup = document.getElementById('urlGroup');
  const folderGroup = document.getElementById('folderGroup');

  typeGroup.style.display = 'none';

  if (type === 'folder') {
    urlGroup.style.display = 'none';
    folderGroup.style.display = 'none';
  } else {
    urlGroup.style.display = '';
    folderGroup.style.display = '';
    populateFolderSelect(state.currentFolderId);
  }

  document.getElementById('itemTitle').value = '';
  document.getElementById('itemUrl').value = '';
  clearErrors();
  document.getElementById('modalOverlay').classList.remove('hidden');
  setTimeout(() => document.getElementById('itemTitle').focus(), 50);
}

function openEditModal(type, id) {
  state.editingItem = { type, id };

  const typeGroup = document.getElementById('typeGroup');
  typeGroup.style.display = 'none';

  if (type === 'folder') {
    const folder = data.folders.find(f => f.id === id);
    document.getElementById('modalTitle').textContent = '📁 フォルダを編集';
    document.getElementById('itemTitle').value = folder.title;
    document.getElementById('urlGroup').style.display = 'none';
    document.getElementById('folderGroup').style.display = 'none';
  } else {
    const bm = data.bookmarks.find(b => b.id === id);
    document.getElementById('modalTitle').textContent = '🔖 ブックマークを編集';
    document.getElementById('itemTitle').value = bm.title;
    document.getElementById('itemUrl').value = bm.url;
    document.getElementById('urlGroup').style.display = '';
    document.getElementById('folderGroup').style.display = '';
    populateFolderSelect(bm.folderId || null);
  }

  clearErrors();
  document.getElementById('modalOverlay').classList.remove('hidden');
  setTimeout(() => document.getElementById('itemTitle').focus(), 50);
}

function populateFolderSelect(selectedFolderId) {
  const sel = document.getElementById('itemFolder');
  let html = '<option value="">ルート（フォルダなし）</option>';
  for (const f of data.folders.sort((a, b) => a.title.localeCompare(b.title, 'ja'))) {
    const selected = f.id === selectedFolderId ? 'selected' : '';
    html += `<option value="${f.id}" ${selected}>${esc(f.title)}</option>`;
  }
  sel.innerHTML = html;
}

function closeModal() {
  document.getElementById('modalOverlay').classList.add('hidden');
  state.editingItem = null;
  state.addingType = null;
}

function clearErrors() {
  document.getElementById('titleError').textContent = '';
  document.getElementById('urlError').textContent = '';
}

document.getElementById('modalCancel').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

document.getElementById('modalForm').addEventListener('submit', e => {
  e.preventDefault();
  clearErrors();

  const title = document.getElementById('itemTitle').value.trim();
  const url = document.getElementById('itemUrl').value.trim();
  const folderId = document.getElementById('itemFolder').value || null;
  const isFolder = state.editingItem
    ? state.editingItem.type === 'folder'
    : state.addingType === 'folder';

  let valid = true;
  if (!title) {
    document.getElementById('titleError').textContent = 'タイトルを入力してください';
    valid = false;
  }
  if (!isFolder && !url) {
    document.getElementById('urlError').textContent = 'URLを入力してください';
    valid = false;
  }
  if (!isFolder && url && !isValidUrl(url)) {
    document.getElementById('urlError').textContent = '有効なURLを入力してください';
    valid = false;
  }
  if (!valid) return;

  if (state.editingItem) {
    // Edit
    if (isFolder) {
      const f = data.folders.find(f => f.id === state.editingItem.id);
      f.title = title;
    } else {
      const b = data.bookmarks.find(b => b.id === state.editingItem.id);
      b.title = title;
      b.url = normalizeUrl(url);
      b.folderId = folderId;
    }
    toast('保存しました', 'success');
  } else {
    // Add
    if (isFolder) {
      data.folders.push({ id: genId(), title });
    } else {
      data.bookmarks.push({
        id: genId(),
        title,
        url: normalizeUrl(url),
        folderId: folderId || state.currentFolderId || null,
      });
    }
    toast('追加しました', 'success');
  }

  save(data);
  closeModal();
  render();
});

// ===== Delete =====
function deleteItem(type, id) {
  let name;
  if (type === 'folder') {
    const f = data.folders.find(f => f.id === id);
    name = f.title;
    const count = data.bookmarks.filter(b => b.folderId === id).length;
    const msg = count > 0
      ? `フォルダ「${name}」と中の ${count} 件のブックマークを削除しますか？`
      : `フォルダ「${name}」を削除しますか？`;
    if (!confirm(msg)) return;
    data.folders = data.folders.filter(f => f.id !== id);
    data.bookmarks = data.bookmarks.filter(b => b.folderId !== id);
  } else {
    const b = data.bookmarks.find(b => b.id === id);
    name = b.title;
    if (!confirm(`「${name}」を削除しますか？`)) return;
    data.bookmarks = data.bookmarks.filter(b => b.id !== id);
  }
  save(data);
  toast('削除しました');
  render();
}

// ===== Search =====
document.getElementById('searchInput').addEventListener('input', e => {
  state.searchQuery = e.target.value.trim();
  render();
});

// ===== Utilities =====
function esc(str) {
  return String(str ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function highlight(text, query) {
  if (!query) return esc(text);
  const escaped = esc(text);
  const re = new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
  return escaped.replace(re, m => `<mark>${m}</mark>`);
}

function isValidUrl(url) {
  try { new URL(url); return true; } catch { return false; }
}

function normalizeUrl(url) {
  if (!url.startsWith('http://') && !url.startsWith('https://')) {
    return 'https://' + url;
  }
  return url;
}

function getFavicon(url) {
  try {
    const u = new URL(url);
    return `https://www.google.com/s2/favicons?domain=${u.hostname}&sz=32`;
  } catch { return ''; }
}

function toast(msg, type = '') {
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ===== Init =====
render();
</script>
</body>
